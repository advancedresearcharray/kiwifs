      - BearerAuth: []
      summary: Read file content or metadata
      tags:
      - files
    put:
      consumes:
      - text/plain
      - application/octet-stream
      - application/x-symlink
      description: Writes content to a file. If the Content-Type header is application/x-symlink,
        creates a symbolic link instead. Supports optimistic concurrency control.
      parameters:
      - description: Path of the file to write (must start with '/')
        in: query
        name: path
        required: true
        type: string
      - description: File content or symlink target path (max 32MB)
        in: body
        name: body
        required: true
        schema:
          type: string
      - description: ETag to check for conflict (prevents update if the file changed)
        in: header
        name: If-Match
        type: string
      - description: Actor identity performing the write
        in: header
        name: X-Actor
        type: string
      - description: Provenance metadata header
        in: header
        name: X-Provenance
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "413":
          description: Request Entity Too Large
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
