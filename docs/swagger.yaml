        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a file
      tags:
      - files
    get:
      description: Reads a file's content or metadata from the file system. Supports
        conditional GET using ETag/Last-Modified, link resolution, and metadata-only
        output.
      parameters:
      - description: Path of the file to read (must start with '/')
        in: query
        name: path
        required: true
        type: string
      - description: If true, returns only the Markdown frontmatter metadata as JSON
        in: query
        name: metadata_only
        type: boolean
      - description: If true, resolves wiki-style links in markdown files
        in: query
        name: resolve_links
        type: boolean
      - description: Referrer or source recording page views
        in: query
        name: source
        type: string
      - description: ETag to check for caching (returns 304 Not Modified if matched)
        in: header
        name: If-None-Match
        type: string
      - description: HTTP date to check for caching
        in: header
        name: If-Modified-Since
        type: string
      responses:
        "200":
          description: File content (raw bytes) or JSON metadata
          schema:
            type: string
        "304":
          description: Not Modified
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
