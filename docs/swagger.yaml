host: localhost:3333
info:
  contact:
    name: KiwiFS Support
    url: https://github.com/kiwifs/kiwifs
  description: KiwiFS is a content-addressable file system with an API.
  license:
    name: Business Source License 1.1
    url: https://github.com/kiwifs/kiwifs/blob/main/LICENSE
  title: KiwiFS API
  version: "1.0"
paths:
  /{path}:
    get:
      description: Serves the embedded React UI files (Javascript, CSS, images, etc.)
        from `ui/dist`. Falls back to index.html for client-side routing on other
        non-API requests.
      parameters:
      - description: Path to the asset
        in: path
        name: path
        required: true
        type: string
      responses:
        "200":
          description: HTML, JS, CSS, or image assets
          schema:
            type: file
      summary: Serve React Web UI assets
      tags:
      - ui
  /api/kiwi/analytics:
    get:
      description: Retrieve system-wide analytics, including document health, coverage,
        engagement metrics, and top updated pages. Requires SQLite search backend.
      parameters:
      - description: Directory path prefix to filter statistics
        in: query
        name: scope
        type: string
      - description: 'Number of days since update to consider a page stale (default:
          30)'
        in: query
        name: stale_threshold
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AnalyticsResponse'
        "500":
          description: Internal server error while building stats
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Analytics not implemented for non-SQLite backends
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get system-wide analytics
      tags:
      - analytics
  /api/kiwi/analytics/content-gaps:
    get:
      description: Identifies missing documentation or search gaps by listing queries
        that returned zero results. Requires SQLite search backend.
      parameters:
      - description: 'Maximum number of content gaps to return (default: 20)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.AnalyticsContentGapsResponse'
        "500":
          description: Internal query error
          schema:
            additionalProperties:
              type: string
            type: object
        "501":
          description: Analytics v2 not implemented for non-SQLite backends
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get search content gaps
      tags:
      - analytics
  /api/kiwi/analytics/content-gaps/dismiss:
    post:
      consumes:
      - application/json
