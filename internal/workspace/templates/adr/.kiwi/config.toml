[server]
port = 3333
host = "127.0.0.1"

[storage]
root = "."

[search]
engine = "sqlite"

[versioning]
strategy = "git"

[lint]
require_frontmatter = true

[links]
typed_fields = ["supersedes", "superseded_by", "contradicts"]

[format_hooks.auto_sequence]
directory = "decisions/"
field = "adr_number"

[auth]
type = "none"
