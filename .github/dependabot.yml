version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      ui-minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: npm
    directory: /npm
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/New_York
    open-pull-requests-limit: 3
    groups:
      npm-wrapper-minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:45"
      timezone: America/New_York
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
      include: scope
