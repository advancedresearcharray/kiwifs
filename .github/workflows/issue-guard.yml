name: Issue Guard

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check issue against templates
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const body = issue.body || '';

            // --- SAFETY: skip trusted authors ---

            // Bots and internal automation
            const trustedBots = [
              'github-actions[bot]', 'dependabot[bot]', 'release-please[bot]',
              'cursor[bot]', 'renovate[bot]'
            ];
            if (trustedBots.includes(author)) {
              console.log(`Trusted bot: ${author} — skipping`);
              return;
            }

            // Check if author is a collaborator, member, or owner
            try {
              const { data: permLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: author,
              });
              const perm = permLevel.permission;
              if (['admin', 'write', 'maintain'].includes(perm)) {
                console.log(`Collaborator (${perm}): ${author} — skipping`);
                return;
              }
            } catch (e) {
              // Not a collaborator — continue with validation
            }

            // Check if author is an org member
            try {
              await github.rest.orgs.checkMembershipForUser({
                org: context.repo.owner,
                username: author,
              });
              console.log(`Org member: ${author} — skipping`);
              return;
            } catch (e) {
              // Not an org member — continue
            }

            // --- TEMPLATE VALIDATION ---

            // Bug report markers (from bug_report.yml)
            const bugMarkers = [
              '### KiwiFS version',
              '### Operating system',
              '### What happened?',
              '### Steps to reproduce',
              '### Expected behavior',
            ];

            // Feature request markers (from feature_request.yml)
            const featureMarkers = [
              '### Use case',
              '### Proposed solution',
              '### How are you using KiwiFS?',
            ];

            const isBugReport = bugMarkers.filter(m => body.includes(m)).length >= 3;
            const isFeatureRequest = featureMarkers.filter(m => body.includes(m)).length >= 2;

            if (isBugReport || isFeatureRequest) {
              console.log('Issue matches a template — allowing');
              return;
            }

            // --- DOES NOT MATCH: close with helpful message ---

            console.log(`Issue #${issue.number} by ${author} does not match any template — closing`);

            const { data: current } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            });

            if (current.state === 'closed' && current.locked) {
              console.log(`Issue #${issue.number} already closed and locked — skipping`);
              return;
            }

            const closeComment = [
              `Hi @${author}, thanks for reaching out!`,
              '',
              'This issue was automatically closed because it doesn\'t appear to use one of our issue templates.',
              'This helps us keep issues organized and actionable.',
              '',
              '**To resubmit, please use one of these templates:**',
              `- [Bug report](https://github.com/${context.repo.owner}/${context.repo.repo}/issues/new?template=bug_report.yml)`,
              `- [Feature request](https://github.com/${context.repo.owner}/${context.repo.repo}/issues/new?template=feature_request.yml)`,
              '',
              'If you have a question instead, please use [Discussions](https://github.com/${context.repo.owner}/${context.repo.repo}/discussions).',
              '',
              '*This is an automated action. If you believe this was a mistake, please re-open with a template or contact the maintainers.*',
            ].join('\n');

            const tolerateModerationRace = (step, error) => {
              if (error.status === 403 || error.status === 422) {
                console.log(`${step}: ${error.message} — continuing`);
                return;
              }
              throw error;
            };

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: closeComment,
              });
            } catch (error) {
              tolerateModerationRace('createComment', error);
            }

            try {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
            } catch (error) {
              tolerateModerationRace('closeIssue', error);
            }

            try {
              await github.rest.issues.lock({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                lock_reason: 'spam',
              });
            } catch (error) {
              tolerateModerationRace('lockIssue', error);
            }
