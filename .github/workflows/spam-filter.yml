name: Spam Filter

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  filter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect and hide CJK spam
        uses: actions/github-script@v7
        with:
          script: |
            const { runSpamFilter } = require('./.github/scripts/spam-filter.cjs');
            await runSpamFilter({ github, context });
