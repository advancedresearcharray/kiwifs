version: 2

project_name: kiwifs

before:
  hooks:
    - go mod tidy

builds:
  - id: kiwifs
    main: .
    binary: kiwifs
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: kiwifs
    name: kiwifs
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - repository:
      owner: kiwifs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://kiwifs.com"
    description: "Markdown filesystem for agents and teams"
    license: "Apache-2.0"
    install: |
      bin.install "kiwifs"
    test: |
      system "#{bin}/kiwifs", "--version"
